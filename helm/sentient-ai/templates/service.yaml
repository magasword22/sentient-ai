apiVersion: v1
kind: Service
metadata:
  name: {{ include "sentient-ai.fullname" . }}
  labels:
    {{- include "sentient-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8501
      protocol: TCP
      name: http
  selector:
    {{- include "sentient-ai.selectorLabels" . | nindent 4 }}
