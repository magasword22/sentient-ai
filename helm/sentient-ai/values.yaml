# Default values for sentient-ai.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: sentient-app
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8501

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: sentient.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

persistence:
  enabled: true
  size: 10Gi
  storageClassName: "standard"

ollama:
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 11434
  resources:
    limits:
      cpu: "4"
      memory: 8Gi
      # To enable AMD ROCm/Nvidia GPU resources, configure limits below:
      # nvidia.com/gpu: "1"
    requests:
      cpu: "2"
      memory: 4Gi
